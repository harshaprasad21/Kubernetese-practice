apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.mongo.name }}
spec:
  replicas: {{ .Values.mongo.replicaCount }}          
  selector:
    matchLabels:
      app: {{ .Values.mongo.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.mongo.name }}
    spec:
      containers:
      - name: {{ .Values.mongo.name }}
        image: {{ .Values.mongo.image.repository }}:{{ .Values.mongo.image.tag }}
        ports:
        - containerPort: 27017
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: {{ .Values.mongo.name }}-data        
          mountPath: /data/db        
      volumes:
      - name: {{ .Values.mongo.name }}-data          
        persistentVolumeClaim:
          claimName: {{ .Values.mongo.name }}-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.mongo.name }}-internal-service
spec:
  type: {{ .Values.mongo.service.type }}
  selector:
    app: {{ .Values.mongo.name }}
  ports:
  - port: 27017
    targetPort: 27017